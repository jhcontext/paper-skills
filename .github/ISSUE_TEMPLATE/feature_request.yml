name: Feature request
description: Suggest a new skill or an improvement to an existing one
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve paper-skills.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The research-workflow gap or pain point you are hitting.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >-
        The skill or change you would like. If it is a new skill, sketch what
        it would take as input, what it would do, and what it would write back.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you handle this today.
    validations:
      required: false
